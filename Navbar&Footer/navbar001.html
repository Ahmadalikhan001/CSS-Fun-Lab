<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3">
    <title>first Navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: rgb(9, 233, 233);
        }

        nav {
            background-color: bisque;
            height: 50px;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgb(245, 51, 245);
        }

        .logo {
            color: rgb(75, 2, 91);
            font-weight: bold;
        }

        .FooterMain {}
    </style>
</head>

<body>
    <nav>
        <div class="logo">
            MyLogo
        </div>
        <div class="main">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">LogIn</a>

        </div>

    </nav>
    <div class="FooterMain">
        <footer class="footer">
            <a href="#">About</a>
            <a href="#">Contact</a>
            <a href="#">CEO</a>
            <button class="btn">Go Back Top</button>
        </footer>
    </div>
</body>

</html>
