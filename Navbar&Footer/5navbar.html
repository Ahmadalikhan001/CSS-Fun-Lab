<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar 1 - Blue Professional</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f2f5f9;
        }

        /* Navbar */

        nav {
            background: #2563eb;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }


        .logo {
            color: white;
            font-size: 26px;
            font-weight: bold;
        }


        .menu a {

            color: white;
            text-decoration: none;
            margin-left: 25px;
            font-size: 17px;
            transition: 0.3s;
        }


        .menu a:hover {

            color: #ffd700;
            border-bottom: 2px solid white;
            padding-bottom: 5px;

        }


        /* Button */

        .btn {

            background: white;
            color: #2563eb;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;

        }


        .btn:hover {

            background: #ffd700;
            color: black;

        }


        /* Content */

        .content {

            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;

        }


        .content h1 {

            color: #2563eb;
            font-size: 40px;

        }


        .content p {

            margin-top: 15px;
            color: #555;
            font-size: 18px;

        }
    </style>

</head>


<body>


    <!-- Navigation Bar -->

    <nav>

        <div class="logo">
            MyWebsite
        </div>


        <div class="menu">

            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Portfolio</a>
            <a href="#">Contact</a>

</html>
