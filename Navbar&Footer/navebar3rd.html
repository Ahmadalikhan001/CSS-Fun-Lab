<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3">
    <title>Navbar 3rd.</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: #91b9f5;
    }

    section {
        margin: 40px;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, .2);
    }

    .demo {
        padding: 50px;
        text-align: center;
        background: white;
    }

    h2 {
        margin-bottom: 15px;
    }

    /* ================= HEADER 1 ================= */

    .header1 {
        background: #022d5e;
        padding: 18px;
        text-align: center;
    }

    .header1 a {
        color: white;
        text-decoration: none;
        margin: 20px;
        font-weight: bold;
        transition: .3s;
    }

    .footer1:hover,
    .header1 a:hover {
        color: yellow;
    }

    /* ================= FOOTER 1 ================= */

    .footer1 {
        background: #0077ff;
        color: white;
        text-align: center;
        padding: 20px;
    }
</style>

<body>
    <section>

        <header class="header1">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
        </header>

        <div class="demo">
            <h2>Header & Footer Style 1</h2>
            <p>Simple Blue Navigation Bar</p>
        </div>

        <footer class="footer1">
            <p>© 2026 My Website | All Rights Reserved</p>
        </footer>

    </section>
</body>

</html>
