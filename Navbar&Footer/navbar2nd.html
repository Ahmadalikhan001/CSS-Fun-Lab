<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3">
    <title>Navbar 2nd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: aqua;
        }

        .Navbar {
            background-color: bisque;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0px 4px 10px rgba(247, 98, 98, 0.3);
        }

        .Logo {
            font-weight: bold;
            color: rgb(36, 82, 1);
        }
    </style>
</head>

<body>
    <div class="main">

        <nav class="Navbar">
            <a class="Logo">MyLogo</a>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <button type="button">LogIn</button>
        </nav>
    </div>
</body>

</html>
