<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3">
    <title>Navbar 2nd</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: aqua;
            flex-wrap: wrap;
        }

        .Navbar {
            background-color: bisque;
            padding: 10px;
            flex-wrap: wrap;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0px 4px 10px rgba(247, 98, 98, 0.3);
        }

        .Logo {
            font-weight: bold;
            color: rgb(36, 82, 1);
            text-shadow: 0 4px 10px rgb(231, 58, 58);
            text-decoration: none;
        }

        .Logo:hover {
            color: crimson;
            text-shadow: 0 4px 10px rgb(35, 168, 35);

        }

        .btn {
            color: rgb(24, 47, 2);
            font-weight: bold;
            height: 26px;
            width: 70px;
            padding: 5px;
            border: none;
            background-color: rgb(180, 133, 224);
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 2px 4px 10px rgb(244, 68, 68);
        }

        .btn:hover {
            background-color: rgb(178, 220, 104);
            color: brown;
            box-shadow: 2px 4px 10px rgb(145, 201, 4);
            transition: 3s;
        }

        .Navbar>a {
            text-decoration: none;
            color: rgb(11, 43, 1);
            text-shadow: 0 4px 10px rgb(237, 82, 82);
        }

        .Navbar>a:hover {
            color: crimson;
            text-shadow: 0 4px 10px rgb(35, 168, 35);
        }
    </style>
</head>

<body>
    <div class="main">

        <nav class="Navbar">
            <h3 class="Logo">MyLogo</h3>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
            <button class="btn" type="button">LogIn</button>
        </nav>
    </div>
</body>

</html>
